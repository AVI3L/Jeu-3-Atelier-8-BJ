<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Royale - Machine à sous Immersive</title>
    <link rel="stylesheet" href="../src/css/roulette.css">



</head>
<body>

    <div class="game-wrapper">

        <div class="top-bar">
            <div class="setup-solde">
                <span>Solde de départ :</span>
                <input type="number" id="inputSoldeDepart" value="500" min="10">
                <button id="btnAppliquer" class="btn-premium">Fixer</button>
            </div>
        </div>

        <div class="main-content">

            <div class="slot-machine-viewport">
              
                <img id="slotBg" class="slot-machine-image" 
                     src="../src/img/slot_machine.png" 
                     alt="Machine"
                     onerror="this.onerror=null; this.src='http://googleusercontent.com/image_generation_content/263';">

            
                <div class="interactive-overlay">

                    
                    <div class="led-status-screen">
                        <p id="messageStatut">PRÊT À JOUER</p>
                        <h2 id="AfficheResultat"></h2>
                    </div>

                    
                    <div class="reels-container">
                        <div id="fenetre1" class="reel-window">
                            <span id="rouleau1">7️⃣</span>
                        </div>
                        <div id="fenetre2" class="reel-window">
                            <span id="rouleau2">🍒</span>
                        </div>
                        <div id="fenetre3" class="reel-window">
                            <span id="rouleau3">🍀</span>
                        </div>
                    </div>

                  
                    <div class="hud-balance">
                        <span id="soldePieces">500</span>
                    </div>

                    <div class="hud-mise">
                        <input type="number" id="inputMise" value="10" min="1">
                    </div>

                   
                    <button id="boutonLevier" class="physical-spin-button" title="Lancer !"></button>

                    <div id="levierPoignee" class="lever-hotspot" title="Actionner le levier !"></div>

                  
                    <div id="btnBetPlus" class="hud-btn-bet-plus" title="Mise +10"></div>
                    <div id="btnMaxBet" class="hud-btn-max-bet" title="Tapis !"></div>

                    <div id="zoneRecharge" class="recharge-overlay" style="display:none">
                        <h3>💸 PLUS DE JETONS</h3>
                        <p>Recharger le compte :</p>
                        <div class="recharge-row">
                            <input type="number" id="inputMontantRecharge" value="500" min="10">
                            <button id="boutonRecharge" class="btn-premium">RECHARGER</button>
                        </div>
                    </div>

                </div>
            </div>

            <div class="payout-card">
                <p class="payout-title">— GAINS —</p>
                <div class="payout-grid">
          
                    <div class="payout-line"><span>7️⃣ 7️⃣ 7️⃣ </span><strong>x100</strong></div>
                    <div class="payout-line"><span>💎 💎 💎 </span><strong>x50</strong></div>
                    <div class="payout-line"><span>💰 💰 💰 </span><strong>x25</strong></div>
                    <div class="payout-line"><span>🍀 🍀 🍀 </span><strong>x10</strong></div>
                    <div class="payout-line"><span>🔔 🔔 🔔 </span><strong>x5</strong></div>
                    <div class="payout-line"><span>🍒 🍒 🍒 </span><strong>x4</strong></div>
                    <div class="payout-line"><span>🍋 🍋 🍋 </span><strong>x3</strong></div>
                    <div class="payout-line"><span>🥐 🥐 🥐 </span><strong>x2</strong></div>
                    <div class="payout-divider"></div>
                    <div class="payout-line"><span>2 Symboles Identiques</span><strong>x1</strong></div>
                    <div class="payout-line"><span>🔔 Cloche n'importe où</span><strong>x1.6</strong></div>
                </div>
            </div>

        </div>

    </div>
      <script src="../src/js/roulette.js"></script>
</body>
